name: Build Android APK

on:
  push:
    paths:
      - '安卓版/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake libtool \
            libffi-dev libssl-dev \
            openjdk-17-jdk \
            libltdl-dev \
            cmake zip unzip \
            git wget

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Verify buildozer
        run: |
          echo "=== buildozer version ==="
          python3 -m buildozer version || echo "FAILED"
          echo "=== python version ==="
          python3 --version
          echo "=== java version ==="
          java -version 2>&1 || echo "no java"
          echo "=== working directory ==="
          pwd
          echo "=== 安卓版 files ==="
          ls 安卓版/

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v2-${{ hashFiles('安卓版/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v2-

      - name: Build APK
        working-directory: 安卓版
        run: python3 -m buildozer android debug
        timeout-minutes: 45

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PersonalAssistant-APK
          path: 安卓版/bin/*.apk
          retention-days: 30
