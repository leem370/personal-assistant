# 个人助理 Windows 安装包构建
#
# 触发方式：
#   1. 推送到 main 分支
#   2. 在 GitHub 仓库页面手动触发（Actions → Build Windows → Run workflow）
#
# 产物：个人助理Setup.exe（带 NSIS 安装包），自动上传到 Release
#
# 前提：你需要先把这个仓库推到 GitHub（公开仓库免费，私有仓库每月2000分钟免费额度）

name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Windows版/requirements.txt
          pip install pyinstaller pillow

      # 4. PyInstaller 打包（生成 dist/PersonalAssistant/ 目录）
      - name: Build with PyInstaller
        working-directory: Windows版
        run: pyinstaller build.spec --noconfirm

      # 4.5 调试：列出打包产物（定位问题用）
      - name: List build output
        working-directory: Windows版
        shell: powershell
        run: |
          Write-Host "=== dist 目录结构 ==="
          if (Test-Path "dist") {
            Get-ChildItem -Path "dist" -Recurse -Depth 1 | Select-Object FullName
          } else {
            Write-Host "dist 目录不存在！"
          }

      # 5. 安装 NSIS（Windows runner 默认没有，用 Chocolatey 装）
      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y
          # 刷新 PATH 让 makensis 可用
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Verify makensis
        shell: powershell
        run: |
          Write-Host "makensis version:"
          makensis /VERSION
          Write-Host "makensis path:"
          where.exe makensis

      # 6. 用 NSIS 打包成安装程序（直接调 makensis，比第三方 action 更可靠）
      - name: Create installer with NSIS
        working-directory: Windows版
        shell: powershell
        run: makensis /V2 installer.nsi

      # 7. 上传安装包到构建产物（每次构建都能下载）
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PersonalAssistantSetup
          path: Windows版/PersonalAssistantSetup.exe
          if-no-files-found: error

      # 8. 如果是手动触发或打 tag，创建 Release
      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: 个人助理 v1.${{ github.run_number }}
          files: Windows版/PersonalAssistantSetup.exe
